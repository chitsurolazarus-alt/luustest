<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Luu Travels & Logistics</title>
<link rel="icon" type="image/png" href="../assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <a href="../index.html" class="brand">
            <img src="../assets/logo.png" alt="Luu Travels logo">
            <span class="brand-name">Luu Travels <span>& Logistics</span></span>
        </a>
        <h2>Set a New Password</h2>
        <p class="subtitle">Choose a new password for your account.</p>

        <form id="resetForm" novalidate>
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
                <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
                <div class="password-strength-label" id="strengthLabel"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" required placeholder="Re-enter new password">
                <div class="form-error" id="matchError">Passwords do not match.</div>
            </div>
            <div style="margin-top:20px;">
                <button type="submit" class="btn btn-primary btn-block" id="resetBtn">Update Password</button>
            </div>
        </form>
        <div class="form-footer"><a href="login.html" style="color:var(--gray-600);">&larr; Back to login</a></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');
    const strengthLabel = document.getElementById('strengthLabel');

    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        if (!val) { strengthBar.className = 'password-strength-bar'; strengthLabel.textContent = ''; return; }
        const { label, className } = passwordStrength(val);
        strengthBar.className = `password-strength-bar ${className}`;
        strengthLabel.textContent = `Password strength: ${label}`;
    });

    // Supabase places the recovery token in the URL hash; the client picks it up automatically
    // once supabaseClient is initialized, establishing a temporary recovery session.

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = passwordInput.value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const matchError = document.getElementById('matchError');
        matchError.classList.remove('show');

        if (password !== confirmPassword) {
            matchError.classList.add('show');
            return;
        }

        const btn = document.getElementById('resetBtn');
        btn.disabled = true;
        btn.textContent = 'Updating...';

        try {
            await AuthManager.updatePassword(password);
            showToast('Password updated! Please log in.', 'success');
            setTimeout(() => window.location.href = 'login.html', 1500);
        } catch (err) {
            showToast(err.message || 'Could not update password. The reset link may have expired.', 'error');
            btn.disabled = false;
            btn.textContent = 'Update Password';
        }
    });
</script>
</body>
</html>

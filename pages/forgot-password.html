<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Luu Travels & Logistics</title>
<link rel="icon" type="image/png" href="../assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <a href="../index.html" class="brand">
            <img src="../assets/logo.png" alt="Luu Travels logo">
            <span class="brand-name">Luu Travels <span>& Logistics</span></span>
        </a>
        <h2>Reset Your Password</h2>
        <p class="subtitle">Enter your email and we'll send you a reset link.</p>

        <form id="forgotForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div style="margin-top:20px;">
                <button type="submit" class="btn btn-primary btn-block" id="forgotBtn">Send Reset Link</button>
            </div>
        </form>
        <div class="form-footer"><a href="login.html" style="color:var(--gray-600);">&larr; Back to login</a></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const btn = document.getElementById('forgotBtn');
        btn.disabled = true;
        btn.textContent = 'Sending...';

        try {
            await AuthManager.sendPasswordReset(email);
            showToast('If that email exists, a reset link has been sent.', 'success');
            btn.textContent = 'Link Sent';
        } catch (err) {
            showToast(err.message || 'Could not send reset link.', 'error');
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        }
    });
</script>
</body>
</html>

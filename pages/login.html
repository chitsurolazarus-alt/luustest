<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Luu Travels & Logistics</title>
<link rel="icon" type="image/png" href="../assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <a href="../index.html" class="brand">
            <img src="../assets/logo.png" alt="Luu Travels logo">
            <span class="brand-name">Luu Travels <span>& Logistics</span></span>
        </a>
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to book and manage your trips.</p>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Your password">
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <div class="form-check" style="margin-bottom:0;">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <a href="forgot-password.html" style="font-size:0.85rem; color:var(--accent-dark); font-weight:600;">Forgot password?</a>
            </div>
            <div style="margin-top:20px;">
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Log In</button>
            </div>
        </form>
        
        <div class="form-footer">Don't have an account? <a href="register.html" style="color:var(--accent-dark); font-weight:600;">Register</a></div>
        <div class="form-footer">Are you an administrator? <a href="admin-login.html" style="color:var(--primary); font-weight:600;">Admin Login</a></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
            // Direct Supabase login with better error handling
            var { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                console.error('Login error:', error);
                if (error.message.includes('Email not confirmed')) {
                    showToast('Please confirm your email address before logging in.', 'error');
                } else if (error.message.includes('Invalid login credentials')) {
                    showToast('Invalid email or password. Please try again.', 'error');
                } else {
                    showToast(error.message || 'Login failed. Please try again.', 'error');
                }
                btn.disabled = false;
                btn.textContent = 'Log In';
                return;
            }

            if (!data || !data.user) {
                showToast('Login failed. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Log In';
                return;
            }

            // Get user profile from users table
            var { data: profile, error: profileError } = await supabaseClient
                .from('users')
                .select('*')
                .eq('id', data.user.id)
                .maybeSingle();

            if (profileError) {
                console.error('Profile error:', profileError);
                // Try to create profile if it doesn't exist
                var { error: insertError } = await supabaseClient
                    .from('users')
                    .insert([{
                        id: data.user.id,
                        email: data.user.email,
                        full_name: data.user.user_metadata?.full_name || 'New User',
                        phone: data.user.user_metadata?.phone || '',
                        role: 'customer'
                    }]);
                
                if (insertError) {
                    console.error('Could not create profile:', insertError);
                }
                
                // Try fetching again
                var { data: newProfile } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', data.user.id)
                    .maybeSingle();
                
                if (newProfile) {
                    showToast('Login successful!', 'success');
                    if (newProfile.role === 'admin') {
                        setTimeout(function() { window.location.href = 'admin-dashboard.html'; }, 500);
                    } else {
                        setTimeout(function() { window.location.href = 'booking.html'; }, 500);
                    }
                    return;
                }
            }

            if (profile) {
                showToast('Login successful!', 'success');
                if (profile.role === 'admin') {
                    setTimeout(function() { window.location.href = 'admin-dashboard.html'; }, 500);
                } else {
                    setTimeout(function() { window.location.href = 'booking.html'; }, 500);
                }
            } else {
                showToast('Login successful!', 'success');
                setTimeout(function() { window.location.href = 'booking.html'; }, 500);
            }

        } catch (err) {
            console.error('Login error:', err);
            showToast(err.message || 'Login failed. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'Log In';
        }
    });
</script>
</body>
</html>
